spring.application.name=tienda-universitaria

spring.datasource.url=jdbc:postgresql://localhost:5432/tienda_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Para entorno academico: Hibernate genera el schema. En produccion usar Flyway + ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8082

# Paginacion: tamano por defecto 20, cap maximo 200 (evita que el cliente pida 1M)
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=200
